<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem Payroll PT. SIG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f7f5f0;
            --card-bg: #ffffff;
            --accent: #1b4332;
            --accent-hover: #081c15;
            --text-main: #121212;
            --text-muted: #526356;
            --border: #e3dec3;
            --error: #9a031e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(27, 67, 50, 0.08) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(27, 67, 50, 0.04) 0, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 40px 32px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 15px 35px rgba(27, 67, 50, 0.08);
            text-align: center;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .brand-badge {
            background: linear-gradient(135deg, rgba(27, 67, 50, 0.08), rgba(27, 67, 50, 0.04));
            border: 1px solid rgba(27, 67, 50, 0.15);
            padding: 6px 16px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: inline-block;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #081c15 0%, #2d6a4f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .form-group {
            text-align: left;
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-wrapper {
            position: relative;
        }

        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            background-color: #ffffff;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 15px;
            transition: all 0.2s ease;
            outline: none;
        }

        input[type="password"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(27, 67, 50, 0.1);
            background-color: #ffffff;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        .error-message {
            color: var(--error);
            font-size: 12.5px;
            margin-top: 12px;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 6px;
            animation: shake 0.4s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-badge">PT. Seduhlur Indo Group</div>
        <h1>Sistem Otomasi Payroll</h1>
        <p class="subtitle">Platform perapihan database dan slip gaji harian<br><strong>Merempah Malang</strong></p>

        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="password">Kata Sandi Akses</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="Masukkan password..." required autocomplete="current-password">
                </div>
            </div>

            <button type="submit" class="btn-submit">
                Masuk Sistem
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </button>

            <div class="error-message" id="error-box">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                Password salah. Silakan coba lagi.
            </div>
        </form>
    </div>

    <script>
        // Clear previous auth session on load
        sessionStorage.removeItem('payroll_auth');

        function handleLogin(event) {
            event.preventDefault();
            const passwordInput = document.getElementById('password').value;
            const errorBox = document.getElementById('error-box');

            if (passwordInput === 'admin123') {
                sessionStorage.setItem('payroll_auth', 'true');
                errorBox.style.display = 'none';
                window.location.href = 'result_page/index.html';
            } else {
                errorBox.style.display = 'flex';
                // Trigger shake animation again if already showing
                errorBox.style.animation = 'none';
                errorBox.offsetHeight; /* trigger reflow */
                errorBox.style.animation = null; 
            }
        }
    </script>
</body>
</html>
